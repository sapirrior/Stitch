name: Sync Engine from StitchNative

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Personal Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preserve Workflow File
        run: |
          mkdir -p /tmp/preserved/.github/workflows
          cp .github/workflows/mirror.yml /tmp/preserved/.github/workflows/mirror.yml

      - name: Force Sync from Upstream
        run: |
          git remote add upstream https://github.com/StitchNative/Stitch.git
          git fetch upstream
          git fetch upstream --tags
          git checkout main
          git reset --hard upstream/main

      - name: Restore Workflow File
        run: |
          mkdir -p .github/workflows
          cp /tmp/preserved/.github/workflows/mirror.yml .github/workflows/mirror.yml
          git add .github/workflows/mirror.yml
          git diff --cached --quiet || git commit -m "chore: restore mirror workflow after sync"

      - name: Push to Origin
        run: |
          git push origin main --force
          git push origin --tags --force
